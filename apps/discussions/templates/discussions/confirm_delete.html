{% extends "base.html" %}

{% block title %}Delete Post{% endblock %}
{% block page_title %}Delete Post{% endblock %}

{% block content %}
<div class="nc-fade-in" style="max-width: 480px;">
    <div class="card border-danger-subtle">
        <div class="card-body text-center">
            <i class="bi bi-exclamation-triangle text-danger" style="font-size: 2.5rem;"></i>
            <h4 class="mt-3">Delete this post?</h4>
            <p class="nc-text-muted">
                "<strong>{{ post.title }}</strong>" and all its comments will be permanently removed.
            </p>
            <form method="post" class="d-flex gap-2 justify-content-center mt-4">
                {% csrf_token %}
                <a href="{% url 'discussions:detail' post.pk %}" class="btn btn-light">Cancel</a>
                <button type="submit" class="btn btn-danger">Yes, Delete It</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
