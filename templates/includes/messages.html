{% if messages %}
    <div class="nc-toast-container" aria-live="polite" aria-atomic="true">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show nc-alert nc-toast" role="alert">
                {% if message.tags == 'success' %}<i class="bi bi-check-circle-fill"></i>
                {% elif message.tags == 'danger' %}<i class="bi bi-exclamation-triangle-fill"></i>
                {% elif message.tags == 'warning' %}<i class="bi bi-exclamation-circle-fill"></i>
                {% else %}<i class="bi bi-info-circle-fill"></i>{% endif %}
                <span>{{ message }}</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    </div>
{% endif %}
